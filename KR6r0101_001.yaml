body:
  text: 宋鐔津東山沙門臣僧契嵩撰原夫菩提達磨實佛氏一教之二十八祖也與乎大迦葉乃釋迦文如來直下之相承者也傳之中國年世積遠譜諜差謬而學者寡識不能推詳其本真遂不諒紛然異論古今頗爾契嵩平生以此為大患適考其是非正其宗祖其書垂出會頒祖師傳法授衣之圖布諸天下而學佛者雖皆榮之猶聽瑩未諭上意契嵩幸此竊謂識者曰吾佛以正法要為一大教之宗以密傳受為一大教之祖其宗乃聖賢之道源天地生靈之妙本也其祖乃萬世學戒定慧者之大範十二部説之真驗也自書傳亂之曖昧漫漶天下疑之幾千百載矣今上大聖特頒圖以正其宗祖然聖人教道必聖人乃能正之是豈唯萬世佛氏之徒之大幸也亦天地生靈者之大幸也契嵩因不避其僭越愚妄之誅敢昧死引其舊事推衍上聖意仰箋乎祖圖亦先所頒祖師傳法授衣之謂也然其始亂吾宗祖熒惑天下學者莫若乎付法藏傳正其宗祖斷萬世之諍者莫若乎禪經禪經乃先乎付法傳六十二載始終備二十八祖已見於晉之世矣付法傳乃真君廢教之後缺然但謂二十四世方見乎魏之時耳適以禪經驗而付法藏傳果其謬也若如來獨以正法眼藏密付乎大迦葉者則現之涅槃經智度論禪經與其序也以意求之而佛之微旨存焉上睿性高妙獨得乎言謂之外是乃天資佛記也故其發揮禪祖雅與經合宜乎垂之萬世永為定斷三學佛子遵之仰之天下不復疑也其圖所列自釋迦文佛大迦葉至乎曹溪第六祖大鑒禪師凡三十四位又以儒釋之賢其言吾宗祖素有證據者十位列于諸祖之左謹隨其傳法正宗記詣闕上進塵黷宸眷不任惶恐震懼之至謹序始祖釋迦牟尼佛示生於中天竺國為淨飯聖王之子尋捨轉輪聖王位出家成無上道轉大法輪其後七十九歲垂般涅槃乃以其大法印付其高第弟子摩訶迦葉并敕阿難副二傳化復以金縷僧伽梨衣令大迦葉轉付當來補處彌勒佛其説偈曰法本法無法無法法亦法今付無法時法法何曾法第一祖摩訶迦葉本摩竭陀國人出於婆羅門氏其形金色先捨家入山以頭陀法自修及會佛出世遂歸之為師佛般涅槃之後乃命衆阿羅漢與結集法藏其後持佛衣將入定於雞足山以待彌勒下生乃以其法印傳之阿難説偈曰法法本來法無法無非法何於一法中有法有非法第二祖阿難姓剎帝利斛飯王子釋迦如來之從弟慕佛出家為佛侍者總持第一傳佛所説之法若水傳器未嘗忘逸及其欲趣滅度乃以法付其弟子商那和修又囑纍乎末田底迦者説偈曰本來付有法付了言無法各各須自悟悟了無無法第三祖商那和修亦曰舍那婆斯摩突羅國人姓毗舍多氏在母之胎六年生有自然之服隨身而長出家為阿難之徒預受佛記居優留茶伽藍先伏其地之二火龍然後領衆處之及其將入涅槃乃以法付其弟子優波毱多説偈曰非法亦非心無心亦無法説是心法時是法非心法第四祖優波毱多吒利國人姓首陀氏師商那和修出家得道有異迹號為無相好佛度人最衆所記其人籌數盈溢石室將入滅遂以法付其弟子提多迦説偈曰心自本來心本心非有法有法有本心非心非本法第五祖提多迦摩伽國人其姓則未詳初從毱多尊者出家行化至中印土會大仙者彌遮迦自説夙緣求為其徒及將入滅乃以法付彌遮迦説偈曰通達本心法無法無非法悟了同未悟無心亦無法第六祖彌遮迦中印土人姓則未詳初厭仙術求師提多迦出家學佛既而證果行化至北天竺得異人婆須蜜為其説佛昔嘗記汝將紹祖位即攝受為之弟子將般涅槃乃以法付婆須蜜説偈曰無心無可得説得不名法若了心非心始了心心法第七祖婆須蜜北天竺國人姓頗羅墮氏始常服淨衣持一酒器神氣自若人皆不測及遇彌遮迦顯其夙因遂投器從之出家證道納戒行化至迦摩羅國以論議服佛陀難提為之弟子將入涅槃乃以法付之説偈曰心同虛空界示等虛空法證得虛空時無是無非法第八祖佛陀難提迦摩羅國人姓瞿曇氏生而頂有肉髻性大聰明能一覽悉記其齒已四十歲會婆須蜜來其本國乃慕其説法從之出家得道納戒亦務遊化至提伽國得奇人伏馱蜜多為之弟子臨般涅槃乃以法付之説偈曰虛空無內外心法亦如此若了虛空故是達真如理第九祖伏馱蜜多提伽國人姓毗舍羅氏生已五十歲矣口未嘗言足未嘗履遇佛陀難提至其舍父母將以見之既見難提忽自發語趨其前而行即願師之出家尋亦成道戒已遊化至中印土得香蓋長者子即脅尊者也以為弟子將滅度遂以法付之説偈曰真理本無名因名顯真理受得真實法非真亦非偽第十祖脅尊者中印土人在胎凡十六年乃生因名難生多有異迹會佛陀難提至其國父香蓋携詣之求與攝受及為比丘修潔精苦晝夜脅不至席故號脅尊者遊化至花氏國先示瑞相後果得富那夜奢出家為之弟子及其垂滅乃以法付之説偈曰真體自然真因真説有理領得真真法無行亦無止第十一祖富那夜奢花氏國人姓瞿曇氏生有道性自知當遇聖師及脅尊者至其國乃詣其法會語論相契即從之出家得道遊化至波羅奈國得馬鳴為之弟子然正合佛記及臨入滅乃以法付之説偈曰迷悟如隱顯明暗不相離今付隱顯法非一亦非二第十二祖馬鳴波羅奈國人未詳其姓氏初從富那夜奢出家得戒其師為説夙緣曰汝昔嘗化彼一國之人裸形如馬而其人悲鳴戀汝之德因是號汝馬鳴也遊化至花氏國遂降迦毗摩羅大魔即攝伏為之弟子垂般涅槃乃以法付之説偈曰隱顯即本法明暗元不二今付悟了法非取亦非棄第十三祖迦毗摩羅花氏國人未詳其姓氏初為外道有大幻術因詣馬鳴較法不勝遂為其徒得道戒已亦遊化至西天竺降大火龍因之得龍樹為之弟子將滅乃以其法付之説偈曰非隱非顯法説是真實際悟此隱顯法非愚亦非智第十四祖龍樹西天竺國人未詳其姓氏大聰睿世學無所不通其國有山名龍勝其山先有神龍所居有巨樹能蔭衆龍及龍樹有所感悟意欲出家遂入其山依樹修行已能為群龍宣説佛法迦毗摩羅知其名乃來就見龍樹遂禮之為師納戒遊化至南天竺得迦那提婆垂滅度以其法付之説偈曰為明隱顯法方説解脫理於法心不證無嗔亦無喜第十五祖迦那提婆南天竺國人姓毗舍羅會龍樹至其家及門龍樹先遣以滿鉢水置其前那提即以一針投之水中遂師龍樹出家為其高足弟子其後行化至迦毗羅國得羅睺羅多為徒將入滅以法付之説偈曰本對傳法人為説解脫理於法實無證無終亦無始第十六祖羅睺羅多迦毗羅國人姓梵摩氏既遇提婆得明其家樹耳之緣即師之出家悟法有異迹其後統徒遊化至室羅筏城以佛記訪僧伽難提尋亦得其出家為弟子將般涅槃乃以法付之説偈曰於法實無證不取亦不離法非有無相內外云何起第十七祖僧伽難提室羅筏國人姓剎帝利乃其國王之子謂是昔婆羅王佛也示生王家遂於王宮落髮受戒尋出其國之名山石室修禪會羅睺羅多至其禪所因伏膺益求法要羅多即以法傳之後往摩提國尋羅多所記嗣法之者乃得伽耶舍多入滅以法付之説偈曰心地本無生因地從緣起緣種不相妨花果亦復爾第十八祖伽耶舍多摩提國人姓鬱頭藍氏平生尤多奇迹會僧伽難提來其舍相求因師而出家納戒即得付法遊化至月支國遇鳩摩羅多為説其家異大之緣及原吉夢鳩摩羅多即師之出家將入涅槃乃以法付之説偈曰有種有心地因緣能發萌於緣不相礙常生生不生第十九祖鳩摩羅多月支國人姓婆羅門氏夙稱不測之人以緣示生於此尋得師伽耶舍多出家傳法行化至中天竺得闍夜多為其弟子將滅乃以法付之説偈曰性上本無生為對求人説於法既無得何懷決不決第二十祖闍夜多北天竺人未詳其姓氏會鳩摩羅多至其本國聞其所説業通三世感悟從之出家得法乃遊化諸國至羅閲城得婆修槃頭比丘為徒將滅以法付之説偈曰言下合無生同於法界性若能如是解通達事理竟第二十一祖婆修槃頭羅閲國人姓毗舍佉氏在胎嘗有聖僧以其夙緣告其父母及生大異稍長從光度羅漢出家慕飲光修杜多行尋會闍夜多得傳大法遊化至那提國得摩拿羅為徒將滅以法付之説偈曰泡幻同無礙如何不了悟達法在其中非今亦非古第二十二祖摩拿羅那提國人姓剎帝利乃其國王之子也有大神力父王命師婆修盤頭出家已得戒付法遊化自西天竺以神通自舉至月支國得鶴勒那比丘即以法付之尋般涅槃其付法偈曰心隨萬境轉轉處實能幽隨流認得性無喜復無憂第二十三祖鶴勒那月支國人姓婆羅門氏在胎及生頗有異迹尋從羅漢比丘出家納戒常林栖誦經以夙因緣感群鶴依之故得其號晚因摩拿羅得法遊化至中天竺國得師子比丘為其徒將滅以法付之復誡之曰汝往他國其國有難而纍在汝躬慎早付授無令斷絶偈曰認得心性時可説不思議了了無可得得時不説知第二十四祖師子比丘中天竺國人姓婆羅門氏少已出家習定晚又師鶴勒那得付大法往化於罽賓國先化正他宗者如達磨達等甚衆後得長者子斯多決其握珠之緣遂受之出家以其夙緣特加其名曰婆舍斯多斯多戒已師子乃謂曰適觀此國將加難於我我豈苟免而吾所傳如來大法眼藏今付於汝汝宜奉之即去自務傳化或有疑者即以吾僧伽梨衣為信説偈曰正説知見時知見俱是心當心即知見知見即于今第二十五祖婆舍斯多罽賓國人姓婆羅門氏以方言不同本傳凡三出其名生有異迹既遇師子與辨其夙緣乃為其徒師子知自有難遂預以法付之斯多即去歷中天竺南印土所化多有異事遂得南天竺國王之子不知蜜多為之弟子與之還其前所化境將滅以法付之説偈曰聖人説知見當境無是非我今悟真性無道亦無理第二十六祖不如蜜多南天竺國人姓剎帝利亦多異迹以太子從婆舍斯多出家得果尋從斯多出宮乃得付法遊化至東天竺得聖童子瓔珞出家為徒改名般若多羅謂是大勢至菩薩垂迹將入滅乃以法付之説偈曰真性心地藏無頭亦無尾應緣而化物方便呼為智第二十七祖般若多羅東天竺國人姓婆羅門氏初以童子遇不如蜜多其聖迹既顯遂從之出家納戒得傳法印遊化南天竺國得其國王之子菩提多羅為之弟子改其法名曰菩提達磨此後更四十餘載入滅乃以法付之説偈曰心地生諸種因事復生理果滿菩提圓花開世界起第二十八祖菩提達磨其名稱呼不同如達磨多羅之類凡三四説南天竺國人姓剎帝利蓋其國王之子也從般若多羅出家得其付法謂是觀音菩薩之所垂迹其後六十七年乃以法東來震旦其所傳授直指人心見性成佛不資文字初至梁以其機緣不契乃往北魏止於嵩少九年方得慧可從其求道其後果以大法付慧可并衣鉢為信乃為此土傳法之初祖也後去少林而示滅度其傳法偈曰吾本來茲土傳法救迷情一花開五葉結果自然成第二十九祖慧可武牢人姓姬氏三十捐世書出家尋得戒三十二以異夢辭其本師混迹於京洛遇達磨大師乃立雪斷臂懇求法印果得其傳授因為易名遂為衆之所歸尋得三祖僧璨為之弟子以法付之却往鄴都償其夙纍其傳法偈曰本來緣有地因地種花生本來無有種花亦不曾生第三十祖僧璨不知其何許人初以處士見慧可尊者不稱姓名因問法發悟乃師之出家遂命今法名納戒可祖乃以法付之去隱舒州皖公山三十載方為衆所歸尋得道信以沙彌師之道信既納戒即以法付之其後孑然乃南遊于羅浮山其傳法偈曰花種雖因地從地種花生若無人下種花地盡無生第三十一祖道信蘄陽人姓司馬氏以頴悟得法於三祖至唐初乃居蘄之雙峯山途中得奇童度為弟子遂名之曰弘忍尋以法并前祖信衣付之後乃滅度其傳法偈曰花種有生性因地花生生大緣與信合當生生不生第三十二祖弘忍蘄陽黃梅人姓周氏生有殊相有賢者見之曰此具大人相所不及如來者七種耳師四祖道信出家納戒尋得其付法繼居破頭山即雙峯是教化大盛咸亨中客有盧居士自稱慧能自嶺南而來趨其法會忍祖器之以其所呈法偈遂以居士傳法并以衣鉢説偈曰有情來下種因地果還生無情既無種無性亦無生第三十三祖慧能新州新興人姓盧氏初以至孝事母家貧以鬻薪為資因聞商客誦經乃知五祖弘忍傳佛心印遂備資與母辭去就黃梅以求其法見五祖相契竊以居士受法南還廣州落髮於法性寺得具戒後居韶陽曹侯溪大為四衆所歸方以其法普傳前祖所授衣鉢則置之於其所居之寺其後説偈示徒以顯其法偈曰心地含諸種普雨悉皆生頓悟花情已菩提果自成竺大力者第二十三祖鶴勒那之弟子也以漢獻帝之世至于洛邑後乃適吳與康僧會相遇僧會嘗問大力曰仁者師誰曰吾師鶴勒那僧會曰鶴勒之徒如仁者幾何人復有過之者耶大力曰似我者三千若其頴出但一上人耳其號師子比丘其人密受正法與我師繼世方揚化於北天竺國佛馱跋陀天竺人也本姓釋迦氏甘露飯王之後也初會秦僧智嚴於罽賓國乃懇請跋陀偕來諸夏傳授禪法初至長安其後乃之廬山遂出其禪經與遠公同譯譯成遠公為之序嘗謂遠公曰西土傳法祖師自大迦葉直下相承凡有二十七人其二十六祖近世滅度名不如蜜多者所出其繼世弟子曰不若多羅者方在南天竺國行其教化達磨未繼世作祖故未稱之故其禪經曰佛滅度後尊者大迦葉尊者阿難云云乃至不如蜜多羅諸持法人以此慧燈次第相傳我今如其所明而説是義所聞者即達磨多羅也後為二十八祖故遠公序曰達磨多羅西域之俊禪訓之宗寶林傳所謂跋陀嘗與遠公言其傳法諸祖世數固驗於禪經矣愚考其翻譯禪經之時乃先於付法藏傳六十二年而已有二十八祖而付傳輒出魏氏毀教之後但列二十四世妄斷其相付法人於此便絶反于禪經豈其欲有所欺乎愚正宗論嘗指其傳之非詳矣然其謬書可焚也曇摩迦羅者中印土人以魏黃初壬寅三年至于許昌許昌僧光璨嘗問曰西國有何勝師以何法住持迦羅曰西土凡有二大士一曰摩拏羅二十二祖也一曰鶴勒那二十三祖也皆傳正法以法住持其一化西印土其一化中天竺國僧祐者本齊人歸梁以持律知名嘗著出三藏記其薩婆多部相承傳目録曰娑羅多羅二十五祖弗若蜜多二十六祖不若多羅二十七祖達磨多羅二十八祖祐尋終於梁也支強梁樓者中天竺國人也以前魏陳留王世至洛陽與曇諦康僧鎧輩譯經因謂諸僧曰我昔在西域嘗往罽賓國至蔥塗源入其象白山見達磨達年壽甚高謂其得法之師師子尊者嘗為彌羅崛王起難橫害先難預以其相承大迦葉所傳佛之心印妙法付其同學達磨達同學號婆舍斯多也二十五祖也復授衣為信其時即遣往化於南天竺國支強自謂亦相識婆舍斯多然諸祖事迹自七佛以來至乎二十五祖婆舍斯多乃此支強之所譯也那連耶舍者罽賓國人也以東魏孝靜之世至于鄴都初與處士萬天懿譯出尊勝陀羅尼後因謂天懿曰西國諸祖二十七大士亦受持此經然二十七祖號般若多羅其所出繼世弟子曰達磨多羅者昔當魏明帝世正光元年至于洛陽其人亦喜此經萬天懿曰然此大士我亦聞其當於祖位傳佛正法不悉其後復有繼之者乎耶舍遂以偈答之其説皆隱語凡自七佛至二十七祖與達磨二十八祖傳受之事蓋此耶舍之所譯也波羅芬多者中天竺人也以前魏廢帝齊王之嘉平二年來洛陽至晉太始三載其弟子摩伽陀復來芬多因問曰汝在西時頗遊北天竺耶或謂師子尊者無辜為其國王所害是否今復有傳法者與其相繼耶摩伽陀曰然師子害死至今二十三白有沙門號婆舍斯多本罽賓國人先難得其付法授衣即日去之方於中天竺大隆佛事芬多謂其弟子曰我亦聞之汝言驗矣當時好事者即書留于白馬寺後有玄朗法師者得於其寺乃傳於世犍那者不知其西域何國人也未詳何時至諸夏唐天寶中與河南尹李常者相會常問曰天竺禪門祖師多少犍那曰自大迦葉直至般若多羅凡有二十七祖不言達磨以其為此土初祖也若總以西土言之乃有二十八祖也若敘師子尊者旁出達磨達四世二十二人總有四十九祖若從七佛至此璨大師時慶三祖璨師舍利作齋不括橫枝凡有三十一世常又問他僧曰余見祖圖或引五十餘祖至其枝派差殊宗族不定或但有空名此何以然時有六祖弟子曰智本禪師對曰斯蓋後魏之時佛法毀廢當時有僧曇曜於倉卒間單録諸祖名目不暇備寫懷之亡於山谷後三十餘年當其君孝文帝之世曜出之與衆絹綴為付法藏傳其差誤亡失事實乃曇曜之所致也然愚嘗考曇曜輩所為付法藏傳其文誠類單録自彌遮多迦至乎師子羅漢凡七祖師最缺殊無本末亦李常所謂祖圖但空有其名者此是也裴休字公美自唐會昌中以兵部侍郎御史大夫同平章事號為名相撰圭峯密師傳法碑曰釋迦如來最後以法眼付大迦葉令祖祖相傳別行於世非私於迦葉而外人天聲聞菩薩也自大迦葉至於達磨凡二十八世達磨傳可可傳璨璨傳信信傳忍忍傳能為六祖劉昫字耀遠涿州歸義人也天祐中始以軍事衙推仕及開運初授司空平章事又監修國史故其撰唐書神秀傳曰昔後魏未有僧達磨者本天竺國王子以護國出家入南海得禪宗妙法自釋迦相傳有衣鉢為記世相付授初來至梁詣武帝帝問以有為之事達磨不悅乃之魏隱於嵩山少林寺而卒其年魏使宋雲於蔥嶺回見之門徒發其墓但見衣履而已達磨傳慧可慧可傳僧璨僧璨傳道信道信傳弘忍弘忍傳慧能神秀昫卒於宋太保
